  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0e02" stop-opacity="1"/>
      <stop offset="100%" stop-color="#060402" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="cardGlow1" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#92400e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#060402" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cardGlow2" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.14"/>
      <stop offset="60%" stop-color="#7f1d1d" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#060402" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1007"/>
      <stop offset="50%" stop-color="#0f0904"/>
      <stop offset="100%" stop-color="#0a0604"/>
    </linearGradient>
    <linearGradient id="cardFaceHover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#261505"/>
      <stop offset="50%" stop-color="#180e04"/>
      <stop offset="100%" stop-color="#0e0804"/>
    </linearGradient>
    <linearGradient id="topEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="40%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#dc2626" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="topEdgeHover" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#f59e0b" stop-opacity="1"/>
      <stop offset="70%" stop-color="#dc2626" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0.3"/>
